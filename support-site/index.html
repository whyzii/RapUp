<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapUP Support</title>
<style>
  :root {
    --bg: #0a0a0c;
    --card: #14141a;
    --border: #232330;
    --accent: #2e9bff;
    --text: #f2f2f5;
    --muted: #9a9aa5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 56px 24px 80px; }
  header { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
  header img { width: 64px; height: 64px; border-radius: 16px; display: block; }
  header h1 { font-size: 28px; margin: 0; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 15px; }
  h2 { font-size: 20px; margin-top: 48px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-top: 16px; }
  .card p:first-child { margin-top: 0; }
  a { color: var(--accent); }
  a.button {
    display: inline-block;
    background: var(--accent);
    color: #06121f;
    font-weight: 600;
    padding: 12px 22px;
    border-radius: 999px;
    text-decoration: none;
    margin-top: 8px;
  }
  details {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
  }
  details + details { margin-top: 0; }
  summary { cursor: pointer; font-weight: 600; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "›"; display: inline-block; margin-right: 8px; color: var(--accent); transition: transform 0.15s ease; }
  details[open] summary::before { transform: rotate(90deg); }
  details p { margin: 12px 0 4px; color: var(--muted); }
  footer { margin-top: 64px; color: var(--muted); font-size: 13px; text-align: center; }
</style>
</head>
